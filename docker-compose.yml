services:
  fireflyench:
    build:
      context: .
    image: fireflyench:latest
    container_name: fireflyench
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      APP_PORT: ${APP_PORT:-8896}
      DATA_PATH: /moyan/data
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: fireflyench
      DB_PASSWORD: fireflyench_password
      DB_NAME: fireflyench
    ports:
      - "${APP_PORT:-8896}:${APP_PORT:-8896}"
    volumes:
      - ./rdata:/moyan/data

  mysql:
    image: mysql:8.0
    container_name: fireflyench-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: fireflyench
      MYSQL_USER: fireflyench
      MYSQL_PASSWORD: fireflyench_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
